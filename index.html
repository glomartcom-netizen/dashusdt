<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DimeX Master Enterprise Panel</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/ethers@6.7.0/dist/ethers.umd.min.js"></script>
    <style>
    body {
        background: radial-gradient(circle at top, #0f172a, #020617);
        color: #ffffff;
        font-family: 'Segoe UI', Roboto, sans-serif;
    }

    .card-bg {
        background: linear-gradient(145deg, #1e293b, #0f172a);
        border: 1px solid rgba(148, 163, 184, 0.15);
        box-shadow: 0 10px 25px rgba(0,0,0,0.4);
        backdrop-filter: blur(10px);
    }

    .text-primary-color {
        background: linear-gradient(90deg, #06b6d4, #3b82f6, #a855f7);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }

    .bg-primary-color {
        background: linear-gradient(90deg, #06b6d4, #3b82f6);
    }

    button {
        transition: all 0.25s ease-in-out;
    }

    button:hover {
        transform: translateY(-2px);
        filter: brightness(1.1);
    }

    input {
        transition: 0.2s;
    }

    input:focus {
        box-shadow: 0 0 0 2px rgba(6,182,212,0.4);
    }

    .glow {
        box-shadow: 0 0 20px rgba(6,182,212,0.25);
    }

    .card-hover:hover {
        transform: scale(1.02);
        transition: 0.3s;
    }
</style>
</head>

<body class="pb-24">

<header class="border-b border-slate-800 bg-black/30 backdrop-blur-xl sticky top-0 z-40">
    <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
        <h1 class="text-2xl font-bold tracking-wider text-primary-color">
            DIMEX MASTER DASHBOARD
        </h1>

        <button id="connectBtn"
            onclick="openAppKitModal()"
            class="bg-primary-color text-black font-bold px-5 py-2 rounded-xl shadow-lg glow">
            <span id="btnText">Connect Wallet</span>
        </button>
    </div>
</header>

<main class="max-w-7xl mx-auto px-4 mt-8 space-y-8">

<!-- WALLET -->
<div id="walletAddressDiv"
 class="hidden bg-slate-900 p-3 rounded-xl border border-cyan-500/30">
 Connected:
 <span id="userAddress" class="text-cyan-400 font-mono"></span>
</div>

<!-- CAP -->
<section class="card-bg p-6 rounded-2xl">
 <div class="flex justify-between mb-4">
   <h3>4X Income Cap</h3>
   <span id="capPercentage" class="text-yellow-400">0%</span>
 </div>

 <div class="h-4 bg-slate-800 rounded">
   <div id="progressBar" class="h-full bg-gradient-to-r from-cyan-400 to-purple-500" style="width:0%"></div>
 </div>

 <div class="grid grid-cols-3 gap-3 mt-4">
   <div class="bg-slate-900 p-3 rounded"> <p>Target</p><p id="statMapCap">0</p></div>
   <div class="bg-slate-900 p-3 rounded"> <p>Earned</p><p id="statTotalEarned">0</p></div>
   <div class="bg-slate-900 p-3 rounded"> <p>Remain</p><p id="statRemaining">0</p></div>
 </div>
</section>

<!-- STATS -->
<section class="grid md:grid-cols-3 lg:grid-cols-6 gap-4">

<div class="card-bg p-4 rounded-xl"><p>Deposit</p><p id="statTotalDeposit">0</p></div>
<div class="card-bg p-4 rounded-xl"><p>Wallet</p><p id="statWalletBalance">0</p></div>
<div class="card-bg p-4 rounded-xl"><p>ROI</p><p id="statRoiIncome">0</p></div>
<div class="card-bg p-4 rounded-xl"><p>Direct</p><p id="statDirectIncome">0</p></div>
<div class="card-bg p-4 rounded-xl"><p>Binary</p><p id="statBinaryIncome">0</p></div>
<div class="card-bg p-4 rounded-xl"><p>Withdraw</p><p id="statTotalWithdrawn">0</p></div>

</section>

<!-- REFERRAL -->
<section class="grid md:grid-cols-2 gap-4">

<div class="card-bg p-4 rounded-xl">
 <h3 class="text-cyan-400">Left Referral</h3>
 <p id="leftRefLink" class="break-all text-xs"></p>
</div>

<div class="card-bg p-4 rounded-xl">
 <h3 class="text-pink-400">Right Referral</h3>
 <p id="rightRefLink" class="break-all text-xs"></p>
</div>

</section>

<!-- TREE -->
<section class="card-bg p-6 rounded-xl text-center">

<h2 class="text-cyan-400 mb-4">Binary Tree</h2>

<div class="text-center">
 YOU
 <div>/ \</div>

 <div class="grid grid-cols-2 gap-4 mt-4">
   <div class="bg-slate-900 p-3 rounded">
     LEFT<br>
     <span id="nodeLeft">Empty</span>
   </div>

   <div class="bg-slate-900 p-3 rounded">
     RIGHT<br>
     <span id="nodeRight">Empty</span>
   </div>
 </div>
</div>

</section>

<!-- DOWNLINE -->
<section class="grid md:grid-cols-3 gap-4">

<div class="card-bg p-4 rounded-xl">
 <p>Direct</p><p id="countDirect">0</p>
</div>

<div class="card-bg p-4 rounded-xl">
 <p>Left</p><p id="countLeft">0</p>
</div>

<div class="card-bg p-4 rounded-xl">
 <p>Right</p><p id="countRight">0</p>
</div>

</section>

</main>

    <script type="module">      
        import { createAppKit } from 'https://esm.sh/@reown/appkit?bundle'      
        import { Ethers5Adapter } from 'https://esm.sh/@reown/appkit-adapter-ethers5?bundle'      
        import { bsc } from 'https://esm.sh/@reown/appkit/networks?bundle'      
              
        const projectId = '059cc242b0cc96ac9665c598b76ddc7b';      
              
        const modal = createAppKit({      
          adapters: [new Ethers5Adapter()],      
          networks: [bsc],      
          metadata: {       
            name: 'DimeX Pro',       
            url: window.location.origin,       
            icons: ['https://i.ibb.co/HpqwGFqt/logo.png']       
          },      
          projectId,      
          features: { analytics: true }      
        });      
              
        window.appKitModal = modal;      
              
        modal.subscribeState((state) => {      
          if(state?.isConnected && window.syncWallet){      
            window.syncWallet();      
          }      
        });      
              
        /* AUTO RECONNECT SECURE RUNTIME PIPELINE */        
        window.addEventListener("load", () => {        
            let retry = 0;        
            const maxRetries = 10;        
            const reconnect = setInterval(() => {        
                const provider = modal.getWalletProvider();        
                if(provider){        
                    if(window.syncWallet){        
                        window.syncWallet();        
                    }        
                    clearInterval(reconnect);        
                }        
                retry++;        
                if(retry >= maxRetries){        
                    clearInterval(reconnect);        
                }        
            }, 1000);        
        });
    </script>

    <script>
                                        
        const USDT_CONTRACT_ADDRESS = "0x0EB5dC6AF3dBd9F6d10f50c363B61C8714f497E6";
const DIMEX_CONTRACT_ADDRESS = "0xYOUR_DEPLOYED_DIMEX_CONTRACT_ADDRESS";

// ERC20 USDT ABI
const USDT_ABI = [
    "function approve(address spender, uint256 amount) external returns (bool)",
    "function allowance(address owner, address spender) external view returns (uint256)"
];

// DIMEX CONTRACT ABI
const DIMEX_ABI = [
    "function deposit(uint256 _amount, address _ref, address _parent, bool isLeftPlacement) external",
    "function withdraw() external",
    "function getDashboardStats(address _user) external view returns (uint256[7] earnings, uint256[6] volumes, uint256[4] counts, uint256[3] limits)",
    "function getTreeNode(address user) external view returns (address parent, address left, address right, address referrer)",
    "function getWalletBalance(address user) external view returns(uint256)"
];

let provider, signer, userAddress, dimexContract, usdtContract;
let isLeftPlacementSelected = true;

const ZERO_ADDRESS = "0x0000000000000000000000000000000000000000";

/* ---------------- URL REF SYSTEM ---------------- */
window.addEventListener("DOMContentLoaded", () => {
    const params = new URLSearchParams(window.location.search);
    const refParam = params.get("ref");
    const sideParam = params.get("side");

    if (refParam && refParam.startsWith("0x")) {
        document.getElementById("refAddress").value = refParam;
        document.getElementById("parentAddress").value = refParam;
    }

    if (sideParam === "left") setPlacement(true);
    if (sideParam === "right") setPlacement(false);
});

/* ---------------- REF LINKS ---------------- */
function getReferralLinks(address) {
    return {
        left: `${window.location.origin}/?ref=${address}&side=left`,
        right: `${window.location.origin}/?ref=${address}&side=right`
    };
}

/* ---------------- COPY ---------------- */
function copyText(id) {
    const text = document.getElementById(id).textContent;
    if (!text || text.includes("Connect")) {
        return alert("No valid link");
    }
    navigator.clipboard.writeText(text);
    alert("Copied!");
}

/* ---------------- WALLET MODAL ---------------- */
function openAppKitModal() {
    if (window.appKitModal) {
        window.appKitModal.open();
    } else {
        alert("Wallet loading...");
    }
}

/* ---------------- LEFT / RIGHT SELECT ---------------- */
function setPlacement(isLeft) {
    isLeftPlacementSelected = isLeft;

    const leftBtn = document.getElementById("leftPosBtn");
    const rightBtn = document.getElementById("rightPosBtn");

    if (isLeft) {
        leftBtn.className = "py-3 rounded-xl border-2 border-cyan-500 bg-cyan-500/10 text-white font-bold";
        rightBtn.className = "py-3 rounded-xl border border-slate-800 bg-slate-900 text-slate-400";
    } else {
        rightBtn.className = "py-3 rounded-xl border-2 border-cyan-500 bg-cyan-500/10 text-white font-bold";
        leftBtn.className = "py-3 rounded-xl border border-slate-800 bg-slate-900 text-slate-400";
    }
}

/* ---------------- WALLET SYNC ---------------- */
window.syncWallet = async function () {
    const walletProvider = window.appKitModal?.getWalletProvider();
    if (!walletProvider) return;

    try {
        provider = new ethers.BrowserProvider(walletProvider);
        signer = await provider.getSigner();
        userAddress = await signer.getAddress();

        dimexContract = new ethers.Contract(DIMEX_CONTRACT_ADDRESS, DIMEX_ABI, signer);
        usdtContract = new ethers.Contract(USDT_CONTRACT_ADDRESS, USDT_ABI, signer);

        document.getElementById("userAddress").innerText = userAddress;
        document.getElementById("walletAddressDiv").classList.remove("hidden");
        document.getElementById("btnText").innerText = "Connected";

        const links = getReferralLinks(userAddress);
        document.getElementById("leftRefLink").innerText = links.left;
        document.getElementById("rightRefLink").innerText = links.right;

        await loadDashboardData();

    } catch (err) {
        console.error(err);
    }
};

/* ---------------- DASHBOARD LOAD ---------------- */
async function loadDashboardData() {
    if (!dimexContract || !userAddress) return;

    try {
        const stats = await dimexContract.getDashboardStats(userAddress);
        const tree = await dimexContract.getTreeNode(userAddress);
        const walletBalanceRaw = await dimexContract.getWalletBalance(userAddress);

        const earnings = stats.earnings;
        const volumes = stats.volumes;
        const counts = stats.counts;
        const limits = stats.limits;

        // FIXED FORMAT
        const format = (val) => Number(ethers.formatEther(val)).toFixed(2);

        document.getElementById("statTotalEarned").innerText = format(earnings[0]) + " USDT";
        document.getElementById("statRoiIncome").innerText = format(earnings[1]) + " USDT";
        document.getElementById("statDirectIncome").innerText = format(earnings[2]) + " USDT";
        document.getElementById("statBinaryIncome").innerText = format(earnings[3]) + " USDT";
        document.getElementById("statWalletBalance").innerText = format(earnings[4]) + " USDT";
        document.getElementById("statTotalWithdrawn").innerText = format(earnings[5]) + " USDT";

        document.getElementById("withdrawableDisplay").innerText =
            Number(ethers.formatEther(walletBalanceRaw)).toFixed(2) + " USDT";

        document.getElementById("statTotalDeposit").innerText = format(volumes[0]) + " USDT";

        document.getElementById("volActive").innerText = format(volumes[1]);
        document.getElementById("volLeftCF").innerText = format(volumes[2]);
        document.getElementById("volRightCF").innerText = format(volumes[3]);
        document.getElementById("volLeftTotal").innerText = format(volumes[4]);
        document.getElementById("volRightTotal").innerText = format(volumes[5]);

        document.getElementById("volTotal").innerText =
            ((Number(volumes[4]) + Number(volumes[5])) / 1e18).toFixed(2);

        document.getElementById("countDirect").innerText = counts[0];
        document.getElementById("countLeft").innerText = counts[1];
        document.getElementById("countRight").innerText = counts[2];
        document.getElementById("countTotal").innerText = counts[3];

        const mapCap = limits[0];
        const remaining = limits[1];
        const pctBps = Number(limits?.[2] || 0);

        const percentageReal = (pctBps / 100).toFixed(1);

        document.getElementById("statMapCap").innerText = format(mapCap) + " USDT";
        document.getElementById("statRemaining").innerText = format(remaining) + " USDT";
        document.getElementById("capPercentage").innerText = percentageReal + "%";
        document.getElementById("progressBar").style.width = percentageReal + "%";

        const cleanNode = (addr) =>
            addr === ZERO_ADDRESS
                ? "Empty Node"
                : `${addr.slice(0, 6)}...${addr.slice(-4)}`;

        document.getElementById("nodeLeft").innerText = cleanNode(tree.left);
        document.getElementById("nodeRight").innerText = cleanNode(tree.right);

    } catch (err) {
        console.error(err);
        alert(err?.message || "Dashboard load failed");
    }
}

/* ---------------- DEPOSIT ---------------- */
async function executeDeposit() {
    if (!dimexContract) return alert("Connect wallet");

    const amount = document.getElementById("depositAmount").value;
    let ref = document.getElementById("refAddress").value || ZERO_ADDRESS;
    let parent = document.getElementById("parentAddress").value || ZERO_ADDRESS;

    if (!amount) return alert("Enter amount");

    try {
        const amountWei = ethers.parseEther(amount.toString());

        const allowance = await usdtContract.allowance(userAddress, DIMEX_CONTRACT_ADDRESS);

        if (BigInt(allowance) < BigInt(amountWei)) {
            const tx1 = await usdtContract.approve(DIMEX_CONTRACT_ADDRESS, amountWei);
            await tx1.wait();
        }

        const tx2 = await dimexContract.deposit(amountWei, ref, parent, isLeftPlacementSelected);
        await tx2.wait();

        alert("Deposit success");
        await loadDashboardData();

    } catch (err) {
        alert(err?.message || "Deposit failed");
    }
}

/* ---------------- WITHDRAW ---------------- */
async function executeWithdraw() {
    if (!dimexContract) return alert("Connect wallet");

    try {
        const tx = await dimexContract.withdraw();
        await tx.wait();

        alert("Withdraw success");
        await loadDashboardData();

    } catch (err) {
        alert(err?.message || "Withdraw failed");
    }
}
    </script>
</body>
</html>
